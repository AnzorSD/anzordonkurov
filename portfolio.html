            <h3>Project 1</h3>
            <p>Hier zie je een raspberry Pi waarmee we gewerkt hebben in het eerste semester. Hierop werden programma's gescgreven waardoor de componenten die we erop hebben gesoldeerd hun werk begonnen te doen. hierop hebben we een potentiometer, 2 drukknoppen en 10 LED-lampjes gemonteerd.</p>

          <figcaption>
            <h3>Project 2</h3>
            <p>Bij het vak Smart Home Project kregen we als taak om de verlichting van het huis van de 
              klant zodanig in te stellen dat de klant zo goed als alles van de verlichting van zijn huis kon bedienen via de LOXONE app.
              De verlichting is dan voorzien van een aanwezigheidssensor en een lichtsensor. 
              Het licht in de woning werd dan ingesteld op basis van aanwezigheid van de bewoner en de intensiteit was ook afhakelijk van of het dag of nacht was.
            </p>
          </figcaption>
        </figure>

            <h3>Project 3</h3>
            <p>Bij het vak sensoren kregen we te maken met een aantal kleinere componenten zoals: een breadbord, weerstandjes en op-amp's die we dan gebruikte om een versterkerschakeling te bouwen met behulp van een operationele versterker.</p>
          </figcaption>

              gedownload worden op onze chip die mee op het breadbordje stond.</p>
